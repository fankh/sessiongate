<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark"><title>Sign in · SessionGate</title><link rel="stylesheet" href="/app.css"></head><body><header class="site-header"><div class="site-header__inner"><a class="brand" href="/login.html"><span class="brand__mark">SG</span><span>SessionGate</span></a><nav class="nav" aria-label="Public"><a href="/login.html" aria-current="page">Sign in</a></nav><div class="account">Secure gateway</div></div></header><main class="page page--narrow"><div class="login-brand"><div class="eyebrow">Zero-trust access</div><h1>Welcome back</h1><p class="muted">Sign in to view the remote systems assigned to you.</p></div><section class="panel"><form id="login" class="stack"><label>Username<input name="username" autocomplete="username" required autofocus></label><label>Password<input name="password" type="password" autocomplete="current-password" required></label><label>Authenticator code <span class="muted">Optional until MFA is enrolled</span><input name="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" placeholder="000000"></label><button>Sign in securely</button></form><div id="status" class="status" role="alert" aria-live="polite"></div><div class="security-note">Your session is stored in a secure, HTTP-only cookie and expires automatically.</div></section></main><footer class="footer"><span>SessionGate</span><span>Protected by Caddy HTTPS</span></footer><script src="/login.js" defer></script></body></html>
